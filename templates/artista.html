<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ artista.nome }} - Link Ufficiali</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CROPPER.JS CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        /* STILE BASE E SFONDO */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 15px; margin: 0; box-sizing: border-box; background-color: #121212; position: relative;
            {% if url_sfondo %} --bg-image: url('{{ url_sfondo }}'); {% endif %}
            
            /* Variabili di default per l'effetto vetro (Livello 3) */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-bg-hover: rgba(255, 255, 255, 0.25);
            --glass-blur: blur(12px);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        /* LIVELLI EFFETTO VETRO */
        body { --glass-bg: rgba(255, 255, 255, 0.02); --glass-bg-hover: rgba(255, 255, 255, 0.08); --glass-blur: blur(2px); --glass-border: rgba(255, 255, 255, 0.05); }
        body { --glass-bg: rgba(255, 255, 255, 0.06); --glass-bg-hover: rgba(255, 255, 255, 0.15); --glass-blur: blur(6px); --glass-border: rgba(255, 255, 255, 0.1); }
        body { --glass-bg: rgba(255, 255, 255, 0.1); --glass-bg-hover: rgba(255, 255, 255, 0.25); --glass-blur: blur(12px); --glass-border: rgba(255, 255, 255, 0.2); }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: var(--bg-image); background-repeat: no-repeat; background-position: center center; background-size: cover; z-index: -2; transition: background-image 0.3s ease; }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); z-index: -1; }
        
        .container { width: 100%; max-width: 400px; text-align: center; position: relative; z-index: 1; margin-bottom: 120px; } 
        
        /* HEADER PROFILO */
        .profile-header { position: sticky; top: 15px; z-index: 900; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; margin-bottom: 10px; height: 180px; background-color: transparent; }

        .profile-pic-wrapper { position: relative; display: inline-block; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; background-color: #333; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #fff; object-fit: cover; border: 3px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); margin: 0; }
        .profile-pic.scrolled { width: 60px; height: 60px; font-size: 24px; border-width: 2px; }
        
        h1 { font-size: 22px; margin: 12px 0 0 0; text-shadow: 0 2px 5px rgba(0,0,0,0.8); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); white-space: normal; line-height: 1.2; padding: 0 10px; }
        h1.scrolled { font-size: 16px; margin-top: 8px; }
        
        /* INPUT EDITOR INLINE */
        .inline-input { background: rgba(0,0,0,0.5); border: 1px dashed rgba(255,255,255,0.5); color: white; text-align: center; border-radius: 10px; padding: 5px 10px; outline: none; transition: all 0.3s; }
        .inline-input:focus { border-color: white; background: rgba(0,0,0,0.8); }
        .name-input { font-size: 22px; font-weight: bold; margin: 12px 0 0 0; width: 80%; }
        
        /* BOTTONI LINK CON VARIABILI CSS PER IL VETRO */
        .link-btn { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; padding: 15px; margin-bottom: 15px; background-color: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); color: #ffffff; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 18px; transition: all 0.3s ease; box-sizing: border-box; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .link-btn i { position: absolute; left: 20px; font-size: 1.3em; }
        .link-btn:hover { background-color: var(--glass-bg-hover); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.4); border: 1px solid rgba(255, 255, 255, 0.4); }
        
        /* FILIGRANA (WATERMARK) */
        .watermark { position: fixed; bottom: 15px; right: 20px; font-size: 12px; color: rgba(255, 255, 255, 0.65); font-family: sans-serif; letter-spacing: 1px; z-index: 1000; display: flex; align-items: center; text-shadow: 0 1px 3px rgba(0,0,0,0.5); transition: all 0.3s ease; pointer-events: none; }
        .watermark a { pointer-events: auto; color: rgba(255, 255, 255, 0.8); text-decoration: none; font-weight: bold; transition: color 0.2s; }
        .watermark a:hover { color: #ffffff; text-decoration: underline; }

        /* MENU TENDINA FIXED */
        .menu-container { position: fixed; top: 20px; right: 20px; z-index: 1001; }
        .menu-btn { width: 45px; height: 45px; border-radius: 50%; background-color: transparent; border: 1px solid transparent; color: #ffffff; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.3s ease; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .menu-btn:hover { background-color: var(--glass-bg-hover); backdrop-filter: var(--glass-blur); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.3); border: 1px solid var(--glass-border); }
        .dropdown-menu { display: none; position: absolute; right: 0; top: 100%; margin-top: 10px; background-color: var(--glass-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 15px; padding: 8px; min-width: 170px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); }
        .dropdown-menu.show { display: block; animation: fadeIn 0.2s ease; }
        .dropdown-item { color: #fff; display: flex; align-items: center; padding: 12px 15px; border-radius: 10px; transition: background 0.2s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-size: 16px; font-weight: bold; }
        .dropdown-item i { margin-right: 12px; font-size: 1.1em; }
        .dropdown-item:hover { background-color: var(--glass-bg-hover); }
        
        .lang-submenu { display: none; flex-direction: column; background-color: rgba(0,0,0,0.3); border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .lang-submenu.show { display: flex; animation: fadeIn 0.2s ease; }
        .lang-item { padding: 10px 15px; cursor: pointer; color: white; border: none; background: none; text-align: left; font-size: 14px; transition: 0.2s; }
        .lang-item:hover { background-color: rgba(255,255,255,0.2); }

        /* MODALI BASE */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(8px); animation: fadeIn 0.3s ease; }
        .modal-content { background-color: rgba(30, 30, 30, 0.6); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.6); position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #fff; cursor: pointer; transition: transform 0.2s; z-index: 10;}
        .close-modal:hover { transform: scale(1.2); }
        
        .pwd-input { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.3); background-color: rgba(0, 0, 0, 0.3); color: #fff; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; outline: none; text-align: center; font-family: monospace; }
        .pwd-input:focus { border-color: #fff; background-color: rgba(0, 0, 0, 0.5); }
        .modal-btn-submit { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; background-color: #fff; color: #121212; font-size: 16px; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .modal-btn-submit:hover { background-color: #e0e0e0; transform: translateY(-2px); }

        /* ========================================= */
        /* STILI SPECIFICI PER L'EDITOR INLINE (WYSIWYG) */
        /* ========================================= */
        
        .edit-only { display: none !important; }
        .view-only { display: flex !important; }
        
        /* Attivazione modalità Editor */
        body.edit-mode .edit-only { display: flex !important; }
        body.edit-mode .view-only { display: none !important; }
        body.edit-mode #activeLinksWrapper { display: none; }
        
        /* Controlli flottanti Sfondo e Vetro */
        .floating-top-left { position: fixed; top: 20px; left: 20px; z-index: 1000; flex-direction: column; gap: 10px; }
        .floating-top-left.edit-only { display: none; }
        body.edit-mode .floating-top-left { display: flex; }
        
        .action-icon-btn { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 50%; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(4px); font-size: 16px; }
        .action-icon-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.1); }
        .action-icon-btn.danger { color: #ff4d4d; border-color: rgba(255,77,77,0.4); }
        .action-icon-btn.danger:hover { background: rgba(255,77,77,0.2); color: #ff1a1a; }
        
        .glass-select { appearance: none; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 12px; border-radius: 10px; outline: none; cursor: pointer; backdrop-filter: blur(4px); font-size: 14px; margin-top: 5px; }
        .glass-select option { background: #1e1e1e; }

        /* Controlli Foto Profilo */
        .profile-edit-overlay { position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px); z-index: 10; }
        .profile-edit-overlay .action-icon-btn { width: 30px; height: 30px; font-size: 12px; border: none; background: transparent; }
        .profile-edit-overlay .action-icon-btn:hover { background: rgba(255,255,255,0.1); }
        .profile-edit-overlay .action-icon-btn.danger:hover { background: rgba(255,77,77,0.2); }

        /* Stile Input Links nell'Editor */
        .link-row { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; width: 100%; background: var(--glass-bg); padding: 10px; border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: var(--glass-blur); }
        .link-row input { flex: 1; background: rgba(0,0,0,0.3); border: 1px dashed rgba(255,255,255,0.3); color: white; padding: 10px; border-radius: 10px; outline: none; transition: 0.3s; width: 40%; }
        .link-row input:focus { border-color: white; background: rgba(0,0,0,0.6); }
        .link-row .remove-btn { background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.3); color: #ff4d4d; border-radius: 10px; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .link-row .remove-btn:hover { background: #ff4d4d; color: white; }
        
        .btn-add-link { background-color: rgba(255, 255, 255, 0.1); color: #fff; border: 1px dashed rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 30px; font-weight: bold; width: 100%; cursor: pointer; transition: all 0.2s; justify-content: center; align-items: center; }
        .btn-add-link:hover { background-color: rgba(255, 255, 255, 0.2); border-style: solid; }
        
        #linksContainer { flex-direction: column; width: 100%; }

        /* Pulsante Salva Flottante In Basso */
        .floating-save-wrapper { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 1000; }
        .btn-save-floating { width: 100%; padding: 15px; border-radius: 30px; border: none; font-weight: bold; background-color: #4CAF50; color: white; font-size: 18px; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.4); text-transform: uppercase; letter-spacing: 1px; }
        .btn-save-floating:hover { background-color: #45a049; transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0,0,0,0.5); }

        /* OVERRIDE CROPPER UI PER TEMA SCURO */
        .cropper-view-box, .cropper-face { border-radius: 0; }
        .crop-profile-mode .cropper-view-box, .crop-profile-mode .cropper-face { border-radius: 50%; }
        .cropper-modal { background-color: rgba(0,0,0,0.8); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @media (min-width: 768px) { .profile-header { height: 210px; } .profile-pic { width: 130px; height: 130px; font-size: 50px; border-width: 4px; } h1 { font-size: 30px; margin-top: 20px; } h1.scrolled { font-size: 20px; } .link-btn { padding: 18px; font-size: 20px; border-radius: 40px; margin-bottom: 18px; } }
    </style>
</head>
<body data-glass="{% if artista.livello_vetro %}{{ artista.livello_vetro }}{% else %}3{% endif %}">

    <!-- CONTROLLI EDITOR SFONDO E VETRO (IN ALTO A SINISTRA) -->
    <div class="floating-top-left edit-only">
        <label class="action-icon-btn" title="Cambia Sfondo">
            <i class="fas fa-image"></i>
            <input type="file" id="uploadBg" accept="image/*" onchange="apriCropper(event, 'bg')" hidden>
        </label>
        <button class="action-icon-btn danger" onclick="impostaRimozioneSfondo()" title="Rimuovi Sfondo">
            <i class="fas fa-trash"></i>
        </button>
        <select id="edit-glass" class="glass-select" onchange="cambiaVetroPreview(this.value)">
            <option value="1" {% if artista.livello_vetro|string == '1' %}selected{% endif %} data-i18n="glass_1">Vetro Liv. 1</option>
            <option value="2" {% if artista.livello_vetro|string == '2' %}selected{% endif %} data-i18n="glass_2">Vetro Liv. 2</option>
            <option value="3" {% if not artista.livello_vetro or artista.livello_vetro|string == '3' %}selected{% endif %} data-i18n="glass_3">Vetro Liv. 3</option>
        </select>
    </div>

    <!-- MENU TENDINA CLASSICO IN ALTO A DESTRA -->
    <div class="menu-container view-only">
        <button class="menu-btn" onclick="document.getElementById('editorMenu').classList.toggle('show')"><i class="fas fa-ellipsis-v"></i></button>
        <div id="editorMenu" class="dropdown-menu">
            <button class="dropdown-item" onclick="document.getElementById('passwordModal').style.display='flex'; document.getElementById('editorMenu').classList.remove('show');">
                <i class="fas fa-pen"></i> <span data-i18n="btn_editor">Modifica Pagina</span>
            </button>
            <button class="dropdown-item" onclick="document.getElementById('langSubmenu').classList.toggle('show')">
                <span id="currentFlag" style="margin-right: 12px;">🇮🇹</span> <span data-i18n="btn_lang">Lingua</span> <i class="fas fa-chevron-down" style="margin-left: auto; margin-right: 0;"></i>
            </button>
            <div id="langSubmenu" class="lang-submenu">
                <button class="lang-item" onclick="cambiaLingua('it')">🇮🇹 Italiano</button>
                <button class="lang-item" onclick="cambiaLingua('en')">🇬🇧 English</button>
            </div>
        </div>
    </div>

    <!-- MODALE PASSWORD -->
    <div id="passwordModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="this.parentElement.parentElement.style.display='none'">&times;</span>
            <h2 data-i18n="pwd_title">Accesso Editor</h2>
            <input type="password" id="artistPassword" class="pwd-input" placeholder="Password">
            <button class="modal-btn-submit" onclick="accediEditor()" data-i18n="pwd_btn">Accedi</button>
        </div>
    </div>

    <!-- MODALE CROPPER -->
    <div id="cropperModal" class="modal-overlay" style="z-index: 3000;">
        <div class="modal-content" style="max-width: 500px; padding: 20px;">
            <span class="close-modal" onclick="chiudiCropper()">&times;</span>
            <h2 data-i18n="crop_title" style="margin-top: 0;">Ritaglia Immagine</h2>
            <div style="max-height: 50vh; width: 100%; margin-bottom: 20px; display: flex; justify-content: center; background: #000;">
                <img id="imageToCrop" style="max-width: 100%; display: block;">
            </div>
            <button class="modal-btn-submit" onclick="applicaTaglio()" data-i18n="crop_btn">Conferma Taglio</button>
        </div>
    </div>

    <!-- CONTENITORE PRINCIPALE (WYSIWYG) -->
    <div class="container">
        <div class="profile-header" id="stickyHeader">
            <div class="profile-pic-wrapper">
                {% if url_profilo %}
                    <img id="mainProfilePic" src="{{ url_profilo }}" alt="{{ artista.nome }}" class="profile-pic">
                {% else %}
                    <div id="mainProfilePic" class="profile-pic">{{ artista.nome.upper() }}</div>
                {% endif %}
                
                <!-- Strumenti Editor per Foto Profilo -->
                <div class="profile-edit-overlay edit-only">
                    <label class="action-icon-btn">
                        <i class="fas fa-pen"></i>
                        <input type="file" id="uploadProfile" accept="image/*" onchange="apriCropper(event, 'profile')" hidden>
                    </label>
                    <button class="action-icon-btn danger" onclick="impostaRimozioneProfilo()">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
            
            <!-- Nome Artista (Sola lettura o Input) -->
            <h1 id="artistNameDisplay" class="view-only">{{ artista.nome }}</h1>
            <input type="text" id="edit-nome" class="edit-only inline-input name-input" value="{{ artista.nome }}" placeholder="Il tuo nome d'arte">
        </div>
        
        <!-- LINKS: Modalità Visualizzazione -->
        <div id="activeLinksWrapper">
            {% for link in links %}
                <a href="{{ link.url }}" target="_blank" class="link-btn"><i class="{{ icona(link.piattaforma) }}"></i>{{ link.piattaforma }}</a>
            {% endfor %}
        </div>
        
        <!-- LINKS: Modalità Editor (Inizialmente vuoto, riempito in JS) -->
        <div id="linksContainer" class="edit-only"></div>
        <button class="edit-only btn-add-link" onclick="aggiungiRigaLink('', '')" id="btnAddLink">+ Aggiungi Link</button>
    </div>

    <!-- PULSANTE SALVA (Modalità Editor) -->
    <div class="floating-save-wrapper edit-only">
        <button id="btnSalva" class="btn-save-floating" onclick="salvaModificheDatabase()" data-i18n="editor_save">
            <i class="fas fa-save" style="margin-right: 8px;"></i> Salva Modifiche
        </button>
    </div>

    <!-- FILIGRANA -->
    <div class="watermark view-only">
        <span>By <a href="https://www.instagram.com/andreaquitadamo__/" target="_blank">Andrea Quitadamo</a> & <a href="https://www.instagram.com/padox_04/" target="_blank">Federico Padovano</a></span>
    </div>

    <!-- CROPPER.JS SCRIPT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        // --- DIZIONARIO LINGUE (i18n) ---
        const dizionario = {
            it: {
                btn_editor: "Modifica Pagina",
                btn_lang: "Lingua",
                pwd_title: "Accesso Editor",
                pwd_btn: "Accedi",
                glass_1: "Vetro Liv. 1",
                glass_2: "Vetro Liv. 2",
                glass_3: "Vetro Liv. 3",
                editor_name_placeholder: "Il tuo nome d'arte",
                editor_add_link: "+ Aggiungi Link",
                editor_save: "Salva Modifiche",
                alert_no_pwd: "Inserisci una password!",
                alert_wrong_pwd: "Password errata. Riprova!",
                alert_server_err: "Errore di comunicazione col server.",
                alert_success: "Boom! Modifiche salvate con successo.",
                alert_save_err: "Errore durante il salvataggio: ",
                saving_btn: "Salvataggio...",
                placeholder_plat: "Nome Es. Spotify",
                placeholder_url: "https://...",
                crop_title: "Posiziona e Ritaglia",
                crop_btn: "Conferma"
            },
            en: {
                btn_editor: "Edit Page",
                btn_lang: "Language",
                pwd_title: "Editor Login",
                pwd_btn: "Login",
                glass_1: "Glass Lvl 1",
                glass_2: "Glass Lvl 2",
                glass_3: "Glass Lvl 3",
                editor_name_placeholder: "Your stage name",
                editor_add_link: "+ Add Link",
                editor_save: "Save Changes",
                alert_no_pwd: "Please enter a password!",
                alert_wrong_pwd: "Wrong password. Try again!",
                alert_server_err: "Server communication error.",
                alert_success: "Boom! Changes saved successfully.",
                alert_save_err: "Error during save: ",
                saving_btn: "Saving...",
                placeholder_plat: "Name E.g. Spotify",
                placeholder_url: "https://...",
                crop_title: "Position and Crop",
                crop_btn: "Confirm"
            }
        };

        let langCorrente = 'it';

        function cambiaLingua(lang) {
            langCorrente = lang;
            document.getElementById('currentFlag').innerText = lang === 'it' ? '🇮🇹' : '🇬🇧';
            document.getElementById('langSubmenu').classList.remove('show');
            document.getElementById('editorMenu').classList.remove('show');

            document.querySelectorAll('').forEach(elemento => {
                let chiave = elemento.getAttribute('data-i18n');
                if (dizionario && dizionario) {
                    // Controlla se è un input o un bottone senza icone dentro
                    if(elemento.tagName.toLowerCase() === 'input' || (elemento.tagName.toLowerCase() === 'button' && !elemento.children.length)){
                        elemento.innerText = dizionario;
                    } else {
                        // Per bottoni con icone all'interno, per evitare di sovrascriverle
                        let span = elemento.querySelector('span') || elemento;
                        span.innerText = dizionario;
                    }
                }
            });

            document.getElementById('edit-nome').placeholder = dizionario.editor_name_placeholder || "Il tuo nome d'arte";
            document.getElementById('btnAddLink').innerText = dizionario.editor_add_link;
            document.querySelectorAll('.plat-input').forEach(el => el.placeholder = dizionario.placeholder_plat);
            document.querySelectorAll('.url-input').forEach(el => el.placeholder = dizionario.placeholder_url);
            
            let btnSalva = document.getElementById("btnSalva");
            if (!btnSalva.disabled) btnSalva.innerHTML = `<i class="fas fa-save" style="margin-right: 8px;"></i> ${dizionario.editor_save}`;
        }

        // Funzione per anteprima in tempo reale del livello di opacità
        function cambiaVetroPreview(livello) {
            document.body.setAttribute('data-glass', livello);
        }

        let passwordInserita = "";
        let flagRimuoviProfilo = false;
        let flagRimuoviSfondo = false;
        
        let cropperIstanza = null;
        let tipoRitaglio = ""; 
        let blobFotoProfilo = null;
        let blobSfondo = null;

        // Array popolato da Jinja (Ripristinato)
        let linkCorrenti =;

        // SCROLL FIXATO: Verifica sempre l'esistenza dell'elemento prima di applicare le classi
        window.addEventListener('scroll', () => {
            let pic = document.getElementById('mainProfilePic');
            let nameView = document.getElementById('artistNameDisplay');
            let nameEdit = document.getElementById('edit-nome');
            
            if (window.scrollY > 30) {
                if(pic) pic.classList.add('scrolled');
                if(nameView) nameView.classList.add('scrolled');
                if(nameEdit) nameEdit.style.fontSize = "16px";
            } else {
                if(pic) pic.classList.remove('scrolled');
                if(nameView) nameView.classList.remove('scrolled');
                if(nameEdit) nameEdit.style.fontSize = "22px";
            }
        });

        // --- FUNZIONI CROPPER ---
        function apriCropper(event, tipo) {
            const file = event.target.files;
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                let imgToCrop = document.getElementById('imageToCrop');
                imgToCrop.src = e.target.result;
                document.getElementById('cropperModal').style.display = 'flex';
                tipoRitaglio = tipo;

                if (cropperIstanza) cropperIstanza.destroy();

                let modalContent = document.querySelector('#cropperModal .modal-content');
                if (tipo === 'profile') {
                    modalContent.classList.add('crop-profile-mode');
                } else {
                    modalContent.classList.remove('crop-profile-mode');
                }

                cropperIstanza = new Cropper(imgToCrop, {
                    aspectRatio: tipo === 'profile' ? 1 : NaN,
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 1,
                    restore: false,
                    guides: true,
                    center: true,
                    highlight: false,
                    cropBoxMovable: tipo === 'bg',
                    cropBoxResizable: tipo === 'bg',
                    toggleDragModeOnDblclick: false,
                });
            }
            reader.readAsDataURL(file);
            event.target.value = ''; 
        }

        function chiudiCropper() {
            document.getElementById('cropperModal').style.display = 'none';
            if (cropperIstanza) {
                cropperIstanza.destroy();
                cropperIstanza = null;
            }
        }

        function applicaTaglio() {
            if (!cropperIstanza) return;

            const canvas = cropperIstanza.getCroppedCanvas({
                width: tipoRitaglio === 'profile' ? 500 : 1080,
                height: tipoRitaglio === 'profile' ? 500 : undefined
            });

            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);

                if (tipoRitaglio === 'profile') {
                    flagRimuoviProfilo = false;
                    blobFotoProfilo = blob; 
                    
                    let imgElement = document.getElementById('mainProfilePic');
                    if(imgElement.tagName.toLowerCase() === 'div') {
                        let newImg = document.createElement('img');
                        newImg.id = 'mainProfilePic';
                        newImg.className = imgElement.className;
                        newImg.src = url;
                        imgElement.parentNode.replaceChild(newImg, imgElement);
                    } else {
                        imgElement.src = url;
                    }
                } else if (tipoRitaglio === 'bg') {
                    flagRimuoviSfondo = false;
                    blobSfondo = blob; 
                    document.body.style.setProperty('--bg-image', `url(${url})`);
                }

                chiudiCropper();
            }, 'image/jpeg', 0.85); 
        }

        function impostaRimozioneProfilo() {
            flagRimuoviProfilo = true;
            blobFotoProfilo = null;
            document.getElementById("uploadProfile").value = ""; 
            
            let imgElement = document.getElementById("mainProfilePic");
            if(imgElement.tagName.toLowerCase() === 'img') {
                let newDiv = document.createElement('div');
                newDiv.id = 'mainProfilePic';
                newDiv.className = imgElement.className; 
                newDiv.innerHTML = "{{ artista.nome.upper() }}";
                imgElement.parentNode.replaceChild(newDiv, imgElement);
            }
        }

        function impostaRimozioneSfondo() {
            flagRimuoviSfondo = true;
            blobSfondo = null;
            document.getElementById("uploadBg").value = ""; 
            document.body.style.setProperty('--bg-image', 'none'); 
        }

        async function accediEditor() {
            let inputPwd = document.getElementById("artistPassword").value.trim();
            if (!inputPwd) { alert(dizionario.alert_no_pwd); return; }

            let formData = new FormData();
            formData.append("password", inputPwd);

            try {
                let response = await fetch("/{{ artista.id }}/verifica-password", {
                    method: "POST", body: formData
                });

                if (response.ok) {
                    passwordInserita = inputPwd; 
                    document.getElementById("passwordModal").style.display = "none";
                    document.getElementById("artistPassword").value = ""; 
                    
                    // ATTIVAZIONE WYSIWYG
                    document.body.classList.add('edit-mode');
                    
                    // Popola i link editabili basati su quelli correnti
                    let container = document.getElementById("linksContainer");
                    container.innerHTML = ""; 
                    linkCorrenti.forEach(l => aggiungiRigaLink(l.piattaforma, l.url));
                    
                } else {
                    alert(dizionario.alert_wrong_pwd);
                    document.getElementById("artistPassword").value = "";
                }
            } catch (error) {
                alert(dizionario.alert_server_err);
            }
        }

        function aggiungiRigaLink(piattaforma, url) {
            let container = document.getElementById("linksContainer");
            let row = document.createElement("div");
            row.className = "link-row";
            row.innerHTML = `
                <input type="text" class="plat-input" value="${piattaforma}" placeholder="${dizionario.placeholder_plat}">
                <input type="url" class="url-input" value="${url}" placeholder="${dizionario.placeholder_url}">
                <button class="remove-btn" onclick="this.parentElement.remove()" title="Rimuovi Link"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(row);
        }

        async function salvaModificheDatabase() {
            let righe = document.querySelectorAll('.link-row');
            let nuoviLinks = [];
            righe.forEach(r => {
                let p = r.querySelector('.plat-input').value.trim();
                let u = r.querySelector('.url-input').value.trim();
                if (p && u) nuoviLinks.push({piattaforma: p, url: u});
            });

            let formData = new FormData();
            formData.append("password", passwordInserita);
            formData.append("links", JSON.stringify(nuoviLinks));
            formData.append("nuovo_nome", document.getElementById("edit-nome").value.trim());
            
            // Invio il livello vetro
            formData.append("livello_vetro", document.getElementById("edit-glass").value);
            
            formData.append("rimuovi_profilo", flagRimuoviProfilo ? "true" : "false");
            formData.append("rimuovi_sfondo", flagRimuoviSfondo ? "true" : "false");

            if (blobFotoProfilo) {
                formData.append("foto_profilo", blobFotoProfilo, "profilo_ritagliato.jpg");
            }
            if (blobSfondo) {
                formData.append("sfondo", blobSfondo, "sfondo_ritagliato.jpg");
            }

            let btn = document.getElementById("btnSalva");
            btn.innerHTML = `<i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i> ${dizionario.saving_btn}`;
            btn.disabled = true;

            try {
                let response = await fetch("/{{ artista.id }}/salva", {
                    method: "POST", body: formData
                });

                let esito = await response.json();
                
                if(response.ok) {
                    alert(dizionario.alert_success);
                    window.location.href = esito.nuovo_url; 
                } else {
                    alert(dizionario.alert_save_err + esito.detail);
                    btn.innerHTML = `<i class="fas fa-save" style="margin-right: 8px;"></i> ${dizionario.editor_save}`;
                    btn.disabled = false;
                }
            } catch (error) {
                alert(dizionario.alert_server_err);
                btn.innerHTML = `<i class="fas fa-save" style="margin-right: 8px;"></i> ${dizionario.editor_save}`;
                btn.disabled = false;
            }
        }

        // Chiusura menu cliccando fuori
        window.onclick = function(event) {
            if (!event.target.closest('.menu-container')) {
                let editMenu = document.getElementById('editorMenu');
                let langMenu = document.getElementById('langSubmenu');
                if (editMenu) editMenu.classList.remove('show');
                if (langMenu) langMenu.classList.remove('show');
            }
        }
    </script>
</body>
</html>
