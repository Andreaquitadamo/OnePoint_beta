<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ artista.nome }} - Link Ufficiali</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        /* STILE BASE E SFONDO */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 15px; margin: 0; box-sizing: border-box; background-color: #121212; position: relative;
            {% if url_sfondo %} --bg-image: url('{{ url_sfondo }}'); {% endif %}
            
            /* Variabili di default per l'effetto vetro (Livello 3) */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-bg-hover: rgba(255, 255, 255, 0.25);
            --glass-blur: blur(12px);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        /* LIVELLI EFFETTO VETRO */
        body[data-glass="1"] { --glass-bg: rgba(255, 255, 255, 0.02); --glass-bg-hover: rgba(255, 255, 255, 0.08); --glass-blur: blur(2px); --glass-border: rgba(255, 255, 255, 0.05); }
        body[data-glass="2"] { --glass-bg: rgba(255, 255, 255, 0.06); --glass-bg-hover: rgba(255, 255, 255, 0.15); --glass-blur: blur(6px); --glass-border: rgba(255, 255, 255, 0.1); }
        body[data-glass="3"] { --glass-bg: rgba(255, 255, 255, 0.1); --glass-bg-hover: rgba(255, 255, 255, 0.25); --glass-blur: blur(12px); --glass-border: rgba(255, 255, 255, 0.2); }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: var(--bg-image); background-repeat: no-repeat; background-position: center center; background-size: cover; z-index: -2; transition: background-image 0.3s; }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); z-index: -1; }
        
        .container { width: 100%; max-width: 400px; text-align: center; position: relative; z-index: 1; margin-bottom: 60px; } 
        
        /* ---------------------------------------------------
           MASCHERA CAMALEONTICA PER FAR SPARIRE I LINK
           --------------------------------------------------- */
        .header-mask {
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 0px; /* Aggiornato dinamicamente dal JS */
            z-index: 10;
            clip-path: inset(0);
            pointer-events: none;
        }
        .header-mask::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: var(--bg-image);
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            z-index: -2;
            transition: background-image 0.3s;
        }
        .header-mask::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* HEADER PROFILO */
        .profile-header { position: sticky; top: 15px; z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; margin-bottom: 10px; min-height: 180px; background-color: transparent; }

        .profile-pic-wrapper { position: relative; display: inline-block; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; background-color: #333; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #fff; object-fit: cover; border: 3px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); margin: 0; }
        .profile-pic.scrolled { width: 60px; height: 60px; font-size: 24px; border-width: 2px; }
        
        h1 { font-size: 22px; margin: 12px 0 0 0; text-shadow: 0 2px 5px rgba(0,0,0,0.8); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); white-space: normal; line-height: 1.2; padding: 0 10px; }
        h1.scrolled { font-size: 16px; margin-top: 8px; }
        
        /* BOTTONI LINK (VIEW MODE) */
        .link-btn { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; padding: 15px; margin-bottom: 15px; background-color: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); color: #ffffff; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 18px; transition: all 0.3s ease; box-sizing: border-box; box-shadow: 0 4px 6px rgba(0,0,0,0.2); cursor: pointer; }
        .link-btn i { position: absolute; left: 20px; font-size: 1.3em; }
        .link-btn:hover { background-color: var(--glass-bg-hover); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.4); border: 1px solid rgba(255, 255, 255, 0.4); }

        /* MODIFICHE TASTO AGGIUNGI LINK */
        .btn-add-link { gap: 10px; border: 1px solid rgba(255,255,255,0.3) !important; background: rgba(0,0,0,0.3) !important; text-align: center; }
        .btn-add-link i { position: static; margin: 0; }

        /* MENU A TENDINA (TRE PUNTINI) E TASTI AZIONE IN ALTO A DESTRA */
        .menu-container { position: fixed; top: 20px; right: 20px; z-index: 1001; }
        .menu-btn { width: 45px; height: 45px; border-radius: 50%; background-color: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); color: #ffffff; font-size: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .menu-btn:hover { background-color: var(--glass-bg-hover); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.4); border-color: rgba(255, 255, 255, 0.4); }
        
        .dropdown-menu { display: none; position: absolute; right: 0; top: 100%; margin-top: 10px; background-color: rgba(20, 20, 20, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 8px; min-width: 170px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .dropdown-menu.show { display: block; animation: fadeIn 0.2s ease; }
        .dropdown-item { color: #fff; display: flex; align-items: center; padding: 12px 15px; border-radius: 10px; transition: background 0.2s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-size: 15px; font-family: inherit; font-weight: bold; }
        .dropdown-item i { margin-right: 12px; font-size: 1.1em; opacity: 0.8; }
        .dropdown-item:hover { background-color: rgba(255,255,255,0.15); }

        .lang-submenu { display: none; flex-direction: column; background-color: rgba(0,0,0,0.5); border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .lang-submenu.show { display: flex; animation: fadeIn 0.2s ease; }
        .lang-item { padding: 10px 15px; cursor: pointer; color: white; border: none; background: none; text-align: left; font-size: 14px; font-weight: bold; transition: 0.2s; }
        .lang-item:hover { background-color: rgba(255,255,255,0.2); }

        /* TASTI V E X IN ALTO A DESTRA (Solo in Modalità Edit) */
        .top-edit-actions { position: fixed; top: 20px; right: 20px; z-index: 1001; display: flex; gap: 10px; }
        .action-icon-top { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; font-size: 20px; backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        .action-icon-top.cancel { background-color: rgba(255, 77, 77, 0.15); border: 1px solid rgba(255, 77, 77, 0.4); color: #ff4d4d; }
        .action-icon-top.cancel:hover { background-color: rgba(255, 77, 77, 0.8); color: white; transform: scale(1.1); }
        
        .action-icon-top.save { background-color: rgba(46, 204, 113, 0.15); border: 1px solid rgba(46, 204, 113, 0.4); color: #2ecc71; }
        .action-icon-top.save:hover { background-color: rgba(46, 204, 113, 0.8); color: white; transform: scale(1.1); }

        /* FILIGRANA */
        .watermark { position: fixed; bottom: 15px; right: 20px; font-size: 12px; color: rgba(255, 255, 255, 0.65); font-family: sans-serif; letter-spacing: 1px; z-index: 1000; display: flex; align-items: center; text-shadow: 0 1px 3px rgba(0,0,0,0.5); transition: all 0.3s ease; }
        .watermark a { color: rgba(255, 255, 255, 0.8); text-decoration: none; font-weight: bold; transition: color 0.2s; }
        .watermark a:hover { color: #ffffff; text-decoration: underline; }

        /* =========================================
           LOGICA INLINE EDITOR (VISIBILITA') 
           ========================================= */
        .edit-mode-only { display: none !important; }
        body.is-editing .edit-mode-only { display: flex !important; }
        body.is-editing .view-mode-only { display: none !important; }
        
        body.is-editing .watermark { display: none; }

        /* INPUT INLINE PER IL NOME */
        .name-edit-wrapper { position: relative; margin-top: 12px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px; transition: margin-top 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .name-edit-wrapper.scrolled { margin-top: 8px; }
        
        input.inline-edit-name { background: transparent; border: none; color: white; font-size: 22px; text-align: center; font-weight: bold; width: auto; max-width: 80%; padding: 5px; font-family: inherit; text-shadow: 0 2px 5px rgba(0,0,0,0.8); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); border-bottom: 2px dashed transparent; }
        input.inline-edit-name.scrolled { font-size: 16px; }
        input.inline-edit-name:focus { outline: none; border-bottom: 2px dashed rgba(255,255,255,0.5); }

        /* CONTROLLI INLINE STILE VETRO E SFONDO */
        .inline-controls-bar { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; justify-content: center; width: 100%; transition: all 0.3s; }
        .mini-action-btn { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 6px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.2s; }
        .mini-action-btn:hover { background: rgba(255,255,255,0.2); }
        select.mini-action-btn { appearance: none; -webkit-appearance: none; outline: none; }
        select.mini-action-btn option { background-color: #1e1e1e; color: #fff; }

        /* BOTTONCINI SULLA FOTO PROFILO IN STILE GLASS */
        .edit-pic-overlay { position: absolute; bottom: 0; right: -10px; display: flex; flex-direction: column; gap: 5px; }
        .pic-btn { width: 35px; height: 35px; border-radius: 50%; background-color: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); font-size: 14px; transition: all 0.2s; }
        .pic-btn:hover { background-color: var(--glass-bg-hover); transform: scale(1.1); }
        .pic-btn.trash { color: #ff4d4d; }
        .pic-btn.trash:hover { background-color: rgba(255, 77, 77, 0.2); border-color: rgba(255, 77, 77, 0.4); color: #fff; }

        /* LISTA LINK IN MODALITA' EDIT */
        #editLinksWrapper { flex-direction: column; width: 100%; }
        .link-edit-row { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 15px; background-color: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); padding: 10px 15px; border-radius: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); box-sizing: border-box; }
        
        .link-edit-text { color: #fff; font-weight: bold; font-size: 16px; flex-grow: 1; display: flex; align-items: center; justify-content: center; gap: 8px; overflow: hidden; }
        .link-edit-text i { position: static; font-size: 1.3em; opacity: 0.9; flex-shrink: 0; }
        .link-edit-text span { flex-grow: 0; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .link-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .action-icon-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; font-size: 14px;}
        .action-icon-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px);}
        .action-icon-btn.trash { background: rgba(255,77,77,0.2); border-color: rgba(255,77,77,0.4); color: #ff4d4d; }
        .action-icon-btn.trash:hover { background: #ff4d4d; color: #fff; }

        /* MODALI (Password, Cropper, Edit Link) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.75); z-index: 3000; justify-content: center; align-items: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); animation: fadeIn 0.3s ease; }
        .modal-content { background-color: rgba(30, 30, 30, 0.6); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.6); position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #fff; cursor: pointer; transition: transform 0.2s; z-index: 10;}
        .close-modal:hover { transform: scale(1.2); }
        .pwd-input, .editor-input { width: 100%; padding: 12px 15px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.3); background-color: rgba(0, 0, 0, 0.3); color: #fff; font-size: 14px; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: border 0.3s; }
        .pwd-input { text-align: center; font-family: monospace; font-size: 16px; }
        .pwd-input:focus, .editor-input:focus { border-color: rgba(255,255,255,0.6); }
        .modal-btn-submit { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; background-color: #fff; color: #121212; font-size: 16px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .modal-btn-submit:hover { background-color: #e0e0e0; }

        /* OVERRIDE CROPPER UI */
        .cropper-view-box, .cropper-face { border-radius: 0; }
        .crop-profile-mode .cropper-view-box, .crop-profile-mode .cropper-face { border-radius: 50%; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body data-glass="{% if artista.livello_vetro %}{{ artista.livello_vetro }}{% else %}3{% endif %}">

    <div class="menu-container view-mode-only">
        <button class="menu-btn" onclick="document.getElementById('mainMenu').classList.toggle('show')">
            <i class="fas fa-ellipsis-v"></i>
        </button>
        
        <div id="mainMenu" class="dropdown-menu">
            <button class="dropdown-item" onclick="document.getElementById('passwordModal').style.display='flex'; document.getElementById('mainMenu').classList.remove('show');">
                <i class="fas fa-pen"></i> <span data-i18n="btn_editor">Modifica</span>
            </button>
            
            <button class="dropdown-item" onclick="document.getElementById('langSubmenu').classList.toggle('show')">
                <span id="currentFlag" style="margin-right: 12px;">🇮🇹</span> <span data-i18n="btn_lang">Lingua</span> <i class="fas fa-chevron-down" style="margin-left: auto; margin-right: 0;"></i>
            </button>
            <div id="langSubmenu" class="lang-submenu">
                <button class="lang-item" onclick="cambiaLingua('it')">🇮🇹 Italiano</button>
                <button class="lang-item" onclick="cambiaLingua('en')">🇬🇧 English</button>
            </div>
        </div>
    </div>

    <div class="top-edit-actions edit-mode-only">
        <button class="action-icon-top cancel" onclick="esciEditor()" title="Annulla">
            <i class="fas fa-times"></i>
        </button>
        <button class="action-icon-top save" onclick="salvaModificheDatabase()" title="Salva Modifiche" id="btnSalvaTop">
            <i class="fas fa-check"></i>
        </button>
    </div>

    <div id="passwordModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="this.parentElement.parentElement.style.display='none'">&times;</span>
            <h2 data-i18n="pwd_title">Accesso Editor</h2>
            <input type="password" id="artistPassword" class="pwd-input" placeholder="Password">
            <button class="modal-btn-submit" onclick="accediEditor()" data-i18n="pwd_btn">Accedi</button>
        </div>
    </div>

    <div id="editSingleLinkModal" class="modal-overlay" style="z-index: 4000;">
        <div class="modal-content">
            <span class="close-modal" onclick="chiudiModaleLink()">&times;</span>
            <h2 data-i18n="edit_link_title" style="margin-top: 0; margin-bottom: 20px;">Dettagli Link</h2>
            
            <input type="hidden" id="editingLinkIndex">
            
            <label style="font-size: 12px; color: rgba(255,255,255,0.6); display: block; margin-bottom: 5px; text-align: left;" data-i18n="placeholder_plat">Nome Piattaforma</label>
            <input type="text" id="single-link-plat" class="editor-input" placeholder="Es. Spotify">
            
            <label style="font-size: 12px; color: rgba(255,255,255,0.6); display: block; margin-bottom: 5px; text-align: left;" data-i18n="placeholder_url">URL</label>
            <input type="url" id="single-link-url" class="editor-input" placeholder="https://...">
            
            <button class="modal-btn-submit" onclick="salvaModaleLink()" data-i18n="crop_btn">Conferma</button>
        </div>
    </div>

    <div class="container">
        
        <div id="headerMask" class="header-mask"></div>

        <div class="profile-header" id="stickyHeader">
            <div class="profile-pic-wrapper">
                {% if url_profilo %}
                    <img id="mainProfilePic" src="{{ url_profilo }}" alt="{{ artista.nome }}" class="profile-pic">
                {% else %}
                    <div id="mainProfilePic" class="profile-pic">{{ artista.nome[0].upper() }}</div>
                {% endif %}
                
                <div class="edit-mode-only edit-pic-overlay">
                    <label class="pic-btn" title="Cambia Foto">
                        <i class="fas fa-camera"></i>
                        <input type="file" id="uploadProfile" accept="image/*" onchange="apriCropper(event, 'profile')" style="display:none;">
                    </label>
                    <button class="pic-btn trash" onclick="impostaRimozioneProfilo()" title="Rimuovi Foto"><i class="fas fa-trash"></i></button>
                </div>
            </div>

            <h1 id="artistNameDisplay" class="view-mode-only">{{ artista.nome }}</h1>
            
            <div class="edit-mode-only name-edit-wrapper">
                <input type="text" id="edit-nome" class="inline-edit-name" value="{{ artista.nome }}" placeholder="Il tuo nome d'arte" title="Clicca per modificare">
                <i class="fas fa-pen" style="font-size: 12px; color: rgba(255,255,255,0.5);"></i>
            </div>
            
            <div class="edit-mode-only inline-controls-bar">
                <label class="mini-action-btn">
                    <i class="fas fa-image"></i> <span data-i18n="editor_change_bg">Sfondo</span>
                    <input type="file" id="uploadBg" accept="image/*" onchange="apriCropper(event, 'bg')" style="display:none;">
                </label>
                <button class="mini-action-btn" style="color: #ff4d4d; border-color: rgba(255,77,77,0.3);" onclick="impostaRimozioneSfondo()">
                    <i class="fas fa-trash"></i>
                </button>
                <select id="edit-glass" class="mini-action-btn" onchange="cambiaVetroPreview(this.value)">
                    <option value="1" {% if artista.livello_vetro|string == '1' %}selected{% endif %} data-i18n="glass_1">Vetro: Leggero</option>
                    <option value="2" {% if artista.livello_vetro|string == '2' %}selected{% endif %} data-i18n="glass_2">Vetro: Medio</option>
                    <option value="3" {% if not artista.livello_vetro or artista.livello_vetro|string == '3' %}selected{% endif %} data-i18n="glass_3">Vetro: Opaco</option>
                </select>
            </div>
        </div>
        
        <div id="activeLinksWrapper" class="view-mode-only" style="width: 100%;">
            {% for link in links %}
                <a href="{{ link.url }}" target="_blank" class="link-btn"><i class="{{ icona(link.piattaforma) }}"></i>{{ link.piattaforma }}</a>
            {% endfor %}
        </div>

        <div id="editLinksWrapper" class="edit-mode-only">
            <div id="linksContainer" style="width: 100%;"></div>
            <button class="link-btn btn-add-link" onclick="aggiungiRigaLink()" id="btnAddLink">
                <i class="fas fa-plus"></i> <span data-i18n="editor_add_link">Aggiungi Link</span>
            </button>
        </div>
    </div>

    <div class="watermark view-mode-only">
        <span>By <a href="https://www.instagram.com/andreaquitadamo__/" target="_blank">Andrea Quitadamo</a> & <a href="https://www.instagram.com/padox_04/" target="_blank">Federico Padovano</a></span>
    </div>

    <div id="cropperModal" class="modal-overlay" style="z-index: 5000;">
        <div class="modal-content" style="max-width: 500px; padding: 20px;">
            <span class="close-modal" onclick="chiudiCropper()">&times;</span>
            <h2 data-i18n="crop_title" style="margin-top: 0;">Ritaglia Immagine</h2>
            <div style="max-height: 50vh; width: 100%; margin-bottom: 20px; display: flex; justify-content: center; background: #000;">
                <img id="imageToCrop" style="max-width: 100%; display: block;">
            </div>
            <button class="modal-btn-submit" onclick="applicaTaglio()" data-i18n="crop_btn">Conferma Taglio</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        const dizionario = {
            it: {
                btn_editor: "Modifica",
                btn_lang: "Lingua",
                pwd_title: "Accesso Editor",
                pwd_btn: "Accedi",
                edit_link_title: "Dettagli Link",
                editor_change_bg: "Sfondo",
                glass_1: "Vetro: Leggero",
                glass_2: "Vetro: Medio",
                glass_3: "Vetro: Opaco",
                placeholder_plat: "Es. Spotify, Instagram...",
                placeholder_url: "https://...",
                editor_add_link: "Aggiungi Link",
                crop_title: "Posiziona e Ritaglia",
                crop_btn: "Conferma",
                alert_no_pwd: "Inserisci una password!",
                alert_wrong_pwd: "Password errata. Riprova!",
                alert_server_err: "Errore di comunicazione col server.",
                alert_success: "Boom! Modifiche salvate con successo."
            },
            en: {
                btn_editor: "Edit",
                btn_lang: "Language",
                pwd_title: "Editor Login",
                pwd_btn: "Login",
                edit_link_title: "Link Details",
                editor_change_bg: "Background",
                glass_1: "Glass: Light",
                glass_2: "Glass: Medium",
                glass_3: "Glass: Opaque",
                placeholder_plat: "e.g., Spotify, Instagram...",
                placeholder_url: "https://...",
                editor_add_link: "Add Link",
                crop_title: "Position and Crop",
                crop_btn: "Confirm",
                alert_no_pwd: "Please enter a password!",
                alert_wrong_pwd: "Wrong password. Try again!",
                alert_server_err: "Server communication error.",
                alert_success: "Boom! Changes saved successfully."
            }
        };

        let langCorrente = 'it';
        function cambiaLingua(lang) {
            langCorrente = lang;
            document.getElementById('currentFlag').innerText = lang === 'it' ? '🇮🇹' : '🇬🇧';
            document.getElementById('langSubmenu').classList.remove('show');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                let key = el.getAttribute('data-i18n');
                if (dizionario[lang][key]) el.innerText = dizionario[lang][key];
            });
            document.getElementById('single-link-plat').placeholder = dizionario[lang].placeholder_plat;
            document.getElementById('single-link-url').placeholder = dizionario[lang].placeholder_url;
        }

        function cambiaVetroPreview(livello) { document.body.setAttribute('data-glass', livello); }

        function getIcona(nome) {
            if (!nome) return 'fas fa-link';
            let n = nome.toLowerCase();
            if(n.includes('spotify')) return 'fab fa-spotify';
            if(n.includes('instagram')) return 'fab fa-instagram';
            if(n.includes('apple')) return 'fab fa-apple';
            if(n.includes('youtube')) return 'fab fa-youtube';
            if(n.includes('tiktok')) return 'fab fa-tiktok';
            if(n.includes('facebook')) return 'fab fa-facebook';
            if(n.includes('twitter') || n.includes('x')) return 'fab fa-x-twitter';
            if(n.includes('soundcloud')) return 'fab fa-soundcloud';
            if(n.includes('twitch')) return 'fab fa-twitch';
            return 'fas fa-link';
        }

        let passwordInserita = "";
        let flagRimuoviProfilo = false;
        let flagRimuoviSfondo = false;
        let cropperIstanza = null;
        let tipoRitaglio = ""; 
        let blobFotoProfilo = null;
        let blobSfondo = null;
        
        let linkCorrenti = [
            {% for link in links %}
                {piattaforma: "{{ link.piattaforma }}", url: "{{ link.url }}"},
            {% endfor %}
        ];

        /* --- LOGICA AGGIORNAMENTO MASCHERA --- */
        function updateMaskHeight() {
            let header = document.getElementById('stickyHeader');
            let mask = document.getElementById('headerMask');
            if(header && mask) {
                let rect = header.getBoundingClientRect();
                // Copre perfettamente fino al bordo inferiore dell'header
                mask.style.height = (rect.bottom + 5) + 'px'; 
            }
        }
        
        // Inizializza la maschera al caricamento e resize
        window.addEventListener('resize', updateMaskHeight);
        document.addEventListener('DOMContentLoaded', updateMaskHeight);

        window.addEventListener('scroll', () => {
            let pic = document.getElementById('mainProfilePic');
            let name = document.getElementById('artistNameDisplay');
            let inputName = document.getElementById('edit-nome');
            let nameWrapper = document.querySelector('.name-edit-wrapper');
            
            if (window.scrollY > 30) { 
                pic.classList.add('scrolled'); 
                name.classList.add('scrolled'); 
                if(inputName) inputName.classList.add('scrolled');
                if(nameWrapper) nameWrapper.classList.add('scrolled');
            } else { 
                pic.classList.remove('scrolled'); 
                name.classList.remove('scrolled'); 
                if(inputName) inputName.classList.remove('scrolled');
                if(nameWrapper) nameWrapper.classList.remove('scrolled');
            }
            
            // Aggiorna dinamicamente la maschera durante lo scroll
            updateMaskHeight();
        });

        /* --- LOGICA INGRESSO/USCITA EDITOR INLINE --- */
        async function accediEditor() {
            let inputPwd = document.getElementById("artistPassword").value.trim();
            if (!inputPwd) { alert(dizionario[langCorrente].alert_no_pwd); return; }

            let formData = new FormData();
            formData.append("password", inputPwd);

            try {
                let response = await fetch("/{{ artista.id }}/verifica-password", { method: "POST", body: formData });
                if (response.ok) {
                    passwordInserita = inputPwd; 
                    document.getElementById("passwordModal").style.display = "none";
                    document.getElementById("artistPassword").value = ""; 
                    
                    disegnaLinkEdit(); 
                    
                    document.body.classList.add('is-editing');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    
                    // Forza l'aggiornamento della maschera per via dei nuovi controlli che appaiono
                    setTimeout(updateMaskHeight, 100);
                } else {
                    alert(dizionario[langCorrente].alert_wrong_pwd);
                    document.getElementById("artistPassword").value = "";
                }
            } catch (error) {
                alert(dizionario[langCorrente].alert_server_err);
            }
        }

        function esciEditor() {
            window.location.reload(); 
        }

        /* --- LOGICA GESTIONE LINK A PILLOLA E MODALE --- */
        function disegnaLinkEdit() {
            let container = document.getElementById("linksContainer");
            container.innerHTML = ""; 
            linkCorrenti.forEach((l, index) => {
                let row = document.createElement("div");
                row.className = "link-edit-row";
                let nomeVisibile = l.piattaforma ? l.piattaforma : "Nuovo Link (Vuoto)";
                
                row.innerHTML = `
                    <div class="link-edit-text"> 
                        <i class="${getIcona(l.piattaforma)}"></i>
                        <span>${nomeVisibile}</span>
                    </div>
                    <div class="link-actions">
                        <button class="action-icon-btn" onclick="apriModaleLink(${index})" title="Modifica"><i class="fas fa-pen"></i></button>
                        <button class="action-icon-btn trash" onclick="rimuoviLink(${index})" title="Rimuovi"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(row);
            });
            setTimeout(updateMaskHeight, 50); // Aggiorna layout post disegno
        }

        function aggiungiRigaLink() {
            linkCorrenti.push({piattaforma: "", url: ""});
            disegnaLinkEdit();
            apriModaleLink(linkCorrenti.length - 1); 
        }

        function rimuoviLink(index) {
            linkCorrenti.splice(index, 1);
            disegnaLinkEdit();
        }

        function apriModaleLink(index) {
            document.getElementById("editingLinkIndex").value = index;
            document.getElementById("single-link-plat").value = linkCorrenti[index].piattaforma;
            document.getElementById("single-link-url").value = linkCorrenti[index].url;
            document.getElementById("editSingleLinkModal").style.display = "flex";
        }

        function chiudiModaleLink() {
            document.getElementById("editSingleLinkModal").style.display = "none";
        }

        function salvaModaleLink() {
            let index = document.getElementById("editingLinkIndex").value;
            let plat = document.getElementById("single-link-plat").value.trim();
            let url = document.getElementById("single-link-url").value.trim();
            
            linkCorrenti[index].piattaforma = plat;
            linkCorrenti[index].url = url;
            
            chiudiModaleLink();
            disegnaLinkEdit();
        }

        /* --- LOGICA CROPPER --- */
        function apriCropper(event, tipo) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                let imgToCrop = document.getElementById('imageToCrop');
                imgToCrop.src = e.target.result;
                document.getElementById('cropperModal').style.display = 'flex';
                tipoRitaglio = tipo;
                if (cropperIstanza) cropperIstanza.destroy();
                let modalContent = document.querySelector('#cropperModal .modal-content');
                if (tipo === 'profile') modalContent.classList.add('crop-profile-mode');
                else modalContent.classList.remove('crop-profile-mode');

                cropperIstanza = new Cropper(imgToCrop, { aspectRatio: tipo === 'profile' ? 1 : NaN, viewMode: 1, dragMode: 'move', autoCropArea: 1, restore: false, guides: true, center: true, highlight: false, cropBoxMovable: tipo === 'bg', cropBoxResizable: tipo === 'bg', toggleDragModeOnDblclick: false });
            }
            reader.readAsDataURL(file);
            event.target.value = ''; 
        }

        function chiudiCropper() {
            document.getElementById('cropperModal').style.display = 'none';
            if (cropperIstanza) { cropperIstanza.destroy(); cropperIstanza = null; }
        }

        function applicaTaglio() {
            if (!cropperIstanza) return;
            const canvas = cropperIstanza.getCroppedCanvas({ width: tipoRitaglio === 'profile' ? 500 : 1080, height: tipoRitaglio === 'profile' ? 500 : undefined });
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                if (tipoRitaglio === 'profile') {
                    flagRimuoviProfilo = false; blobFotoProfilo = blob; 
                    let imgElement = document.getElementById('mainProfilePic');
                    if(imgElement.tagName.toLowerCase() === 'div') {
                        let newImg = document.createElement('img');
                        newImg.id = 'mainProfilePic'; newImg.className = imgElement.className; newImg.src = url;
                        imgElement.parentNode.replaceChild(newImg, imgElement);
                    } else { imgElement.src = url; }
                } else if (tipoRitaglio === 'bg') {
                    flagRimuoviSfondo = false; blobSfondo = blob; 
                    document.body.style.setProperty('--bg-image', `url(${url})`);
                }
                chiudiCropper();
            }, 'image/jpeg', 0.85); 
        }

        function impostaRimozioneProfilo() {
            flagRimuoviProfilo = true; blobFotoProfilo = null;
            document.getElementById("uploadProfile").value = ""; 
            let imgElement = document.getElementById("mainProfilePic");
            if(imgElement.tagName.toLowerCase() === 'img') {
                let newDiv = document.createElement('div');
                newDiv.id = 'mainProfilePic'; newDiv.className = imgElement.className; 
                newDiv.innerHTML = "{{ artista.nome[0].upper() }}";
                imgElement.parentNode.replaceChild(newDiv, imgElement);
            }
        }

        function impostaRimozioneSfondo() {
            flagRimuoviSfondo = true; blobSfondo = null;
            document.getElementById("uploadBg").value = ""; 
            document.body.style.setProperty('--bg-image', 'none'); 
        }

        /* --- SALVATAGGIO FINALE --- */
        async function salvaModificheDatabase() {
            let nuoviLinks = linkCorrenti.filter(l => l.piattaforma.trim() !== "" && l.url.trim() !== "");

            let formData = new FormData();
            formData.append("password", passwordInserita);
            formData.append("links", JSON.stringify(nuoviLinks));
            formData.append("nuovo_nome", document.getElementById("edit-nome").value.trim());
            formData.append("livello_vetro", document.getElementById("edit-glass").value);
            formData.append("rimuovi_profilo", flagRimuoviProfilo ? "true" : "false");
            formData.append("rimuovi_sfondo", flagRimuoviSfondo ? "true" : "false");
            
            if (blobFotoProfilo) formData.append("foto_profilo", blobFotoProfilo, "profilo_ritagliato.jpg");
            if (blobSfondo) formData.append("sfondo", blobSfondo, "sfondo_ritagliato.jpg");

            let btn = document.getElementById("btnSalvaTop");
            let originalIcon = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; 
            btn.disabled = true;

            try {
                let response = await fetch("/{{ artista.id }}/salva", { method: "POST", body: formData });
                let esito = await response.json();
                
                if(response.ok) {
                    alert(dizionario[langCorrente].alert_success);
                    window.location.href = esito.nuovo_url; 
                } else {
                    alert("Errore: " + esito.detail);
                    btn.innerHTML = originalIcon;
                    btn.disabled = false;
                }
            } catch (error) {
                alert(dizionario[langCorrente].alert_server_err);
                btn.innerHTML = originalIcon;
                btn.disabled = false;
            }
        }

        // Chiude i menu se si clicca fuori
        window.onclick = function(event) {
            if (!event.target.closest('.menu-container')) { 
                document.getElementById('mainMenu').classList.remove('show'); 
                document.getElementById('langSubmenu').classList.remove('show'); 
            }
        }
    </script>
</body>
</html>
