<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ artista.nome }} - Link Ufficiali</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <style>
        /* [STILI ORIGINALI INVARIATI PER BREVITÀ, AGGIUNGO SOLO I NECESSARI PER WYSIWYG] */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #ffffff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 15px; margin: 0; box-sizing: border-box; background-color: #121212; position: relative;
            {% if url_sfondo %} --bg-image: url('{{ url_sfondo }}'); {% endif %}
            --glass-bg: rgba(255, 255, 255, 0.1); --glass-bg-hover: rgba(255, 255, 255, 0.25); --glass-blur: blur(12px); --glass-border: rgba(255, 255, 255, 0.2);
        }
        body[data-glass="1"] { --glass-bg: rgba(255, 255, 255, 0.02); --glass-blur: blur(2px); }
        body[data-glass="2"] { --glass-bg: rgba(255, 255, 255, 0.06); --glass-blur: blur(6px); }
        body[data-glass="3"] { --glass-bg: rgba(255, 255, 255, 0.1); --glass-blur: blur(12px); }

        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: var(--bg-image); background-repeat: no-repeat; background-position: center center; background-size: cover; z-index: -2; }
        body::after { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); z-index: -1; }
        
        .container { width: 100%; max-width: 400px; text-align: center; position: relative; z-index: 1; margin-bottom: 90px; } 
        .profile-header { position: sticky; top: 15px; z-index: 900; display: flex; flex-direction: column; align-items: center; height: 180px; transition: all 0.3s; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* WYSIWYG Focus */
        [contenteditable="true"]:focus { outline: 2px dashed #fff; padding: 2px 10px; border-radius: 8px; background: rgba(255,255,255,0.1); }
        .editing-active .link-btn { cursor: default; pointer-events: none; } /* Disabilita click link durante editing */

        .link-btn { display: flex; align-items: center; justify-content: center; position: relative; width: 100%; padding: 15px; margin-bottom: 15px; background-color: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); color: #ffffff; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 18px; transition: all 0.3s ease; }
        .link-btn i { position: absolute; left: 20px; }

        /* MODALI & UI (Mantenuti dal tuo codice) */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-content { background: rgba(30,30,30,0.9); padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--glass-border); color: white; }
        .editor-input, .pwd-input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; }
        .link-row { display: flex; gap: 5px; margin-bottom: 8px; }
        .btn-remove-img { color: #ff4d4d; cursor: pointer; background: none; border: 1px solid #ff4d4d; padding: 5px; border-radius: 5px; width: 100%; margin: 5px 0; }
        .watermark { position: fixed; bottom: 15px; right: 20px; font-size: 12px; opacity: 0.7; }
        .dropdown-menu { display: none; position: absolute; right: 0; background: rgba(20,20,20,0.95); border-radius: 10px; padding: 10px; }
        .dropdown-menu.show { display: block; }
        .dropdown-item { background: none; border: none; color: white; width: 100%; text-align: left; padding: 10px; cursor: pointer; }
    </style>
</head>
<body data-glass="{{ artista.livello_vetro or '3' }}">

    <div class="menu-container" style="position: fixed; top: 20px; right: 20px; z-index: 1001;">
        <button class="dropdown-item" onclick="toggleMenu()"><i class="fas fa-ellipsis-v"></i></button>
        <div id="editorMenu" class="dropdown-menu">
            <button class="dropdown-item" onclick="openPasswordModal()"><i class="fas fa-pen"></i> Editor</button>
            <button class="dropdown-item" onclick="cambiaLingua('it')">🇮🇹 IT</button>
            <button class="dropdown-item" onclick="cambiaLingua('en')">🇬🇧 EN</button>
        </div>
    </div>

    <!-- Modale Password -->
    <div id="passwordModal" class="modal-overlay">
        <div class="modal-content">
            <h2>Editor Access</h2>
            <input type="password" id="artistPassword" class="pwd-input" placeholder="Password">
            <button class="editor-input" style="background: #fff; color: #000; font-weight: bold;" onclick="accediEditor()">Entra</button>
            <button class="dropdown-item" style="text-align: center" onclick="closeModal('passwordModal')">Chiudi</button>
        </div>
    </div>

    <!-- Pannello Controllo (WYSIWYG Side Controller) -->
    <div id="mainEditorModal" class="modal-overlay">
        <div class="modal-content" style="max-height: 80vh; overflow-y: auto;">
            <h3 id="label-style">Stile & Immagini</h3>
            
            <select id="edit-glass" class="editor-input" onchange="updateGlass(this.value)">
                <option value="1">Vetro Leggero</option>
                <option value="2">Vetro Medio</option>
                <option value="3">Vetro Opaco</option>
            </select>

            <button class="btn-remove-img" onclick="document.getElementById('uploadProfile').click()">Cambia Foto</button>
            <input type="file" id="uploadProfile" hidden accept="image/*" onchange="apriCropper(event, 'profile')">
            
            <button class="btn-remove-img" onclick="document.getElementById('uploadBg').click()">Cambia Sfondo</button>
            <input type="file" id="uploadBg" hidden accept="image/*" onchange="apriCropper(event, 'bg')">

            <hr style="border: 0.5px solid #333; margin: 20px 0;">
            <h3>Gestione Link</h3>
            <div id="linksContainer"></div>
            <button class="editor-input" onclick="addLinkRow('', '')">+ Aggiungi Link</button>
            
            <button id="btnSalva" class="editor-input" style="background: #2ecc71; color: white; border: none;" onclick="salvaTutto()">SALVA TUTTO</button>
            <button class="dropdown-item" style="text-align: center" onclick="closeModal('mainEditorModal')">Esci</button>
        </div>
    </div>

    <!-- Cropper Modale -->
    <div id="cropperModal" class="modal-overlay" style="z-index: 3000;">
        <div class="modal-content">
            <div style="height: 300px; background: #000;"><img id="imageToCrop" style="max-width: 100%;"></div>
            <button class="editor-input" onclick="applicaTaglio()">Taglia</button>
        </div>
    </div>

    <div class="container">
        <div class="profile-header">
            {% if url_profilo %}
                <img id="mainProfilePic" src="{{ url_profilo }}" class="profile-pic">
            {% else %}
                <div id="mainProfilePic" class="profile-pic" style="display:flex; align-items:center; justify-content:center; background:#333; font-size:40px;">{{ artista.nome[0] }}</div>
            {% endif %}
            <!-- NOME EDITABILE WYSIWYG -->
            <h1 id="artistNameDisplay" contenteditable="false" oninput="syncName(this.innerText)">{{ artista.nome }}</h1>
        </div>
        
        <div id="activeLinksWrapper">
            <!-- Qui i link vengono renderizzati in tempo reale -->
            {% for link in links %}
                <a href="{{ link.url }}" target="_blank" class="link-btn"><i class="{{ icona(link.piattaforma) }}"></i>{{ link.piattaforma }}</a>
            {% endfor %}
        </div>
    </div>

    <div class="watermark">By Andrea & Federico</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        let passwordSessione = "";
        let blobProfilo = null, blobSfondo = null;
        let cropper;

        // --- CORE WYSIWYG ---

        function toggleMenu() { document.getElementById('editorMenu').classList.toggle('show'); }
        function openPasswordModal() { document.getElementById('passwordModal').style.display = 'flex'; toggleMenu(); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function accediEditor() {
            const pwd = document.getElementById('artistPassword').value;
            // Simulazione validazione (aggiungi la tua fetch qui)
            passwordSessione = pwd;
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('mainEditorModal').style.display = 'flex';
            
            // Attiva l'editing diretto sul nome
            const nameH1 = document.getElementById('artistNameDisplay');
            nameH1.contenteditable = "true";
            document.body.classList.add('editing-active');
            
            // Popola i link nel pannello
            refreshLinkRows();
        }

        function syncName(val) {
            // Se vuoi fare qualcosa mentre l'utente scrive il nome direttamente sull'H1
            console.log("Nome aggiornato:", val);
        }

        function updateGlass(lv) {
            document.body.setAttribute('data-glass', lv);
        }

        function refreshLinkRows() {
            const container = document.getElementById('linksContainer');
            container.innerHTML = '';
            // Prendi i link attuali dal wrapper della pagina
            const currentLinks = document.querySelectorAll('#activeLinksWrapper .link-btn');
            currentLinks.forEach(l => {
                const plat = l.innerText.trim();
                const url = l.href;
                addLinkRow(plat, url);
            });
        }

        function addLinkRow(p, u) {
            const div = document.createElement('div');
            div.className = 'link-row';
            div.innerHTML = `
                <input type="text" class="editor-input" style="width:30%" value="${p}" oninput="renderLinks()" placeholder="Es. Instagram">
                <input type="text" class="editor-input" style="width:60%" value="${u}" oninput="renderLinks()" placeholder="URL">
                <button onclick="this.parentElement.remove(); renderLinks()" style="color:red; background:none; border:none;">X</button>
            `;
            document.getElementById('linksContainer').appendChild(div);
            renderLinks();
        }

        // QUESTA È LA FUNZIONE WYSIWYG: Rigenera la lista link mentre scrivi nel modale
        function renderLinks() {
            const wrapper = document.getElementById('activeLinksWrapper');
            const rows = document.querySelectorAll('.link-row');
            wrapper.innerHTML = '';
            
            rows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                const plat = inputs[0].value;
                const url = inputs[1].value;
                if(plat) {
                    const a = document.createElement('a');
                    a.className = 'link-btn';
                    a.href = url || '#';
                    a.target = "_blank";
                    a.innerHTML = `<i class="fas fa-link"></i> ${plat}`; // Icona generica per preview
                    wrapper.appendChild(a);
                }
            });
        }

        // --- GESTIONE IMMAGINI (CROPPER) ---

        function apriCropper(e, tipo) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById('imageToCrop').src = event.target.result;
                document.getElementById('cropperModal').style.display = 'flex';
                if(cropper) cropper.destroy();
                cropper = new Cropper(document.getElementById('imageToCrop'), {
                    aspectRatio: tipo === 'profile' ? 1 : 16/9,
                    viewMode: 1
                });
                cropper.tipo = tipo;
            };
            reader.readAsDataURL(file);
        }

        function applicaTaglio() {
            const canvas = cropper.getCroppedCanvas();
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                if(cropper.tipo === 'profile') {
                    const pic = document.getElementById('mainProfilePic');
                    if(pic.tagName === 'DIV') {
                        pic.outerHTML = `<img id="mainProfilePic" src="${url}" class="profile-pic">`;
                    } else { pic.src = url; }
                    blobProfilo = blob;
                } else {
                    document.body.style.setProperty('--bg-image', `url(${url})`);
                    blobSfondo = blob;
                }
                closeModal('cropperModal');
            });
        }

        // --- SALVATAGGIO FINALE ---

        async function salvaTutto() {
            const btn = document.getElementById('btnSalva');
            btn.innerText = "Salvataggio...";
            
            const formData = new FormData();
            formData.append("password", passwordSessione);
            formData.append("nuovo_nome", document.getElementById('artistNameDisplay').innerText);
            formData.append("livello_vetro", document.getElementById('edit-glass').value);
            
            const links = [];
            document.querySelectorAll('.link-row').forEach(row => {
                const inputs = row.querySelectorAll('input');
                if(inputs[0].value) links.push({piattaforma: inputs[0].value, url: inputs[1].value});
            });
            formData.append("links", JSON.stringify(links));

            if(blobProfilo) formData.append("foto_profilo", blobProfilo, "p.jpg");
            if(blobSfondo) formData.append("sfondo", blobSfondo, "bg.jpg");

            try {
                const res = await fetch("/{{ artista.id }}/salva", { method: "POST", body: formData });
                if(res.ok) alert("Modifiche applicate con successo!");
                else alert("Errore nel salvataggio");
            } catch(e) { alert("Errore server"); }
            
            btn.innerText = "SALVA TUTTO";
        }
    </script>
</body>
</html>
